name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ["*"]
  workflow_dispatch:

jobs:
  verify:
    name: verify (${{ matrix.os }}, node ${{ matrix.node-version }})
    strategy:
      fail-fast: false
      matrix:
        os: [linux, macos, windows]
        node-version: [24, 26, "lts/*"]
        include:
          - os: linux
            runner: nscloud-ubuntu-22.04-amd64-4x8
          - os: macos
            runner: nscloud-macos-tahoe-arm64-6x14
          - os: windows
            runner: nscloud-windows-2022-amd64-4x8

    runs-on:
      - ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test:run

      - name: Build
        run: pnpm run build

      - name: Verify no uncommitted changes
        shell: bash
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Uncommitted changes detected after build:"
            git status --porcelain
            git diff
            exit 1
          fi

  verify-ok:
    name: Verify
    if: always()
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Check matrix result
        run: |
          if [ "${{ needs.verify.result }}" != "success" ]; then
            echo "::error::One or more verify matrix jobs failed or were cancelled"
            exit 1
          fi
